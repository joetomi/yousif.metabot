<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Updating Dashboard...</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            font-weight: 600;
            margin: 10px 0;
        }
        p {
            color: #94a3b8;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2>Updating Dashboard</h2>
    <p>Please wait while we sync your page connection...</p>
    <script>
        // Reload parent window (main dashboard)
        if (window.opener) {
            window.opener.location.reload();
        }
        // Close the popup window
        window.close();
    </script>
</body>
</html>
